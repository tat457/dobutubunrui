<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>動物仕分けゲーム</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:"Hiragino Sans","Yu Gothic",sans-serif;
    background:#eef7ff;
    color:#12324a;
}

header{
    background:#42a5f5;
    color:#fff;
    text-align:center;
    padding:15px;
    font-size:28px;
    font-weight:700;
}

#topBar{
    display:flex;
    justify-content:space-around;
    align-items:center;
    padding:12px;
    background:#fff;
    position:sticky;
    top:0;
    z-index:10;
    box-shadow:0 2px 5px rgba(0,0,0,0.15);
    gap:12px;
    flex-wrap:wrap;
}

.info{
    font-size:22px;
    font-weight:700;
}

button{
    padding:10px 22px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#ff9800;
    color:#fff;
    cursor:pointer;
}

button:disabled{
    opacity:0.6;
    cursor:not-allowed;
}

#game{
    max-width:1300px;
    margin:auto;
    padding:15px;
}

#categories{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:15px;
    margin-bottom:25px;
}

.category{
    background:#fff;
    border-radius:18px;
    border:4px solid #90caf9;
    min-height:260px;
    padding:12px;
    transition:background-color 0.2s ease, border-color 0.2s ease;
}

.category.correct{
    background:#e8f5e9;
    border-color:#4caf50;
}

.category.wrong{
    background:#ffebee;
    border-color:#f44336;
}

.category.touch-target{
    background:#e3f2fd;
    border-color:#1e88e5;
}

.category h2{
    text-align:center;
    margin-top:0;
}

.dropZone{
    min-height:180px;
    width:100%;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    align-items:flex-start;
    padding:10px;
}

#cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:14px;
}

.card{
    width:120px;
    background:#fff;
    border-radius:15px;
    padding:12px;
    text-align:center;
    cursor:grab;
    box-shadow:0 3px 8px rgba(0,0,0,0.2);
    user-select:none;
    touch-action:none;
}

.card.touch-dragging{
    opacity:0.35;
}

.card:active{
    cursor:grabbing;
}

.card[aria-disabled="true"]{
    opacity:0.75;
    cursor:default;
}

.emoji{
    font-size:52px;
}

.name{
    margin-top:8px;
    font-size:20px;
    font-weight:700;
}

#message{
    text-align:center;
    font-size:30px;
    margin-top:20px;
    min-height:40px;
    font-weight:700;
}

#result{
    text-align:center;
    font-size:36px;
    margin-top:20px;
    color:#1565c0;
    font-weight:700;
}

@media (max-width:700px){
    .card{
        width:95px;
    }

    .emoji{
        font-size:42px;
    }

    .name{
        font-size:16px;
    }

    .info{
        font-size:18px;
    }
}
</style>
</head>
<body>

<header>
動物仕分けゲーム
</header>

<div id="topBar">
    <div class="info">⏰ <span id="time">60</span>秒</div>
    <div class="info">⭐ <span id="score">0</span></div>
    <button id="startBtn" type="button">スタート</button>
</div>

<div id="game">
    <div id="categories">
        <div class="category" data-category="sea">
            <h2>🌊 海の生き物</h2>
            <div class="dropZone"></div>
        </div>

        <div class="category" data-category="fly">
            <h2>🕊 空を飛ぶ</h2>
            <div class="dropZone"></div>
        </div>

        <div class="category" data-category="four">
            <h2>🐾 四本足</h2>
            <div class="dropZone"></div>
        </div>
    </div>

    <div id="cards" aria-label="動物カード一覧"></div>
    <div id="message" aria-live="polite"></div>
    <div id="result" aria-live="polite"></div>
</div>

<script>
"use strict";

const animals = [
    { name: "イルカ", emoji: "🐬", category: "sea" },
    { name: "サメ", emoji: "🦈", category: "sea" },
    { name: "タコ", emoji: "🐙", category: "sea" },
    { name: "クジラ", emoji: "🐋", category: "sea" },
    { name: "カニ", emoji: "🦀", category: "sea" },
    { name: "エビ", emoji: "🦐", category: "sea" },
    { name: "クラゲ", emoji: "🪼", category: "sea" },
    { name: "アザラシ", emoji: "🦭", category: "sea" },
    { name: "熱帯魚", emoji: "🐠", category: "sea" },
    { name: "フグ", emoji: "🐡", category: "sea" },

    { name: "ワシ", emoji: "🦅", category: "fly" },
    { name: "ハト", emoji: "🕊", category: "fly" },
    { name: "フクロウ", emoji: "🦉", category: "fly" },
    { name: "アヒル", emoji: "🦆", category: "fly" },
    { name: "オウム", emoji: "🦜", category: "fly" },
    { name: "ニワトリ", emoji: "🐔", category: "fly" },
    { name: "ひよこ", emoji: "🐤", category: "fly" },
    { name: "コウモリ", emoji: "🦇", category: "fly" },
    { name: "ハチ", emoji: "🐝", category: "fly" },
    { name: "チョウ", emoji: "🦋", category: "fly" },

    { name: "イヌ", emoji: "🐶", category: "four" },
    { name: "ネコ", emoji: "🐱", category: "four" },
    { name: "ライオン", emoji: "🦁", category: "four" },
    { name: "ウマ", emoji: "🐴", category: "four" },
    { name: "ウシ", emoji: "🐮", category: "four" },
    { name: "ブタ", emoji: "🐷", category: "four" },
    { name: "ヒツジ", emoji: "🐑", category: "four" },
    { name: "ヤギ", emoji: "🐐", category: "four" },
    { name: "ゾウ", emoji: "🐘", category: "four" },
    { name: "トラ", emoji: "🐯", category: "four" },
    { name: "クマ", emoji: "🐻", category: "four" },
    { name: "キツネ", emoji: "🦊", category: "four" },
    { name: "オオカミ", emoji: "🐺", category: "four" },
    { name: "シカ", emoji: "🦌", category: "four" },
    { name: "サル", emoji: "🐵", category: "four" }
];

const cards = document.getElementById("cards");
const scoreText = document.getElementById("score");
const timeText = document.getElementById("time");
const message = document.getElementById("message");
const result = document.getElementById("result");
const startBtn = document.getElementById("startBtn");
const categories = Array.from(document.querySelectorAll(".category"));

let score = 0;
let time = 60;
let timer = null;
let playing = false;
let cardIdCounter = 0;
let touchDrag = null;

function shuffle(array){
    for(let i = array.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function resetCategoryState(){
    categories.forEach((category) => {
        category.classList.remove("correct", "wrong", "touch-target");
    });
}

function flashCategory(targetCategory, stateClass){
    const category = categories.find((item) => item.dataset.category === targetCategory);
    if(!category){
        return;
    }

    category.classList.remove("correct", "wrong");
    category.classList.add(stateClass);

    window.setTimeout(() => {
        category.classList.remove(stateClass);
    }, 350);
}

function clearTouchTarget(){
    categories.forEach((category) => {
        category.classList.remove("touch-target");
    });
}

function getTouchPoint(event){
    const touch = event.touches[0] || event.changedTouches[0];
    if(!touch){
        return null;
    }

    return {
        x: touch.clientX,
        y: touch.clientY
    };
}

function updateTouchDragPosition(clientX, clientY){
    if(!touchDrag){
        return null;
    }

    touchDrag.helper.style.left = `${clientX - touchDrag.offsetX}px`;
    touchDrag.helper.style.top = `${clientY - touchDrag.offsetY}px`;

    const hoveredCategory = document.elementFromPoint(clientX, clientY)?.closest(".category");
    clearTouchTarget();

    if(hoveredCategory instanceof HTMLElement){
        hoveredCategory.classList.add("touch-target");
        return hoveredCategory;
    }

    return null;
}

function finishTouchDrag(dropTarget){
    if(!touchDrag){
        return;
    }

    const { card, helper } = touchDrag;
    card.classList.remove("touch-dragging");
    card.removeAttribute("aria-pressed");
    helper.remove();
    touchDrag = null;
    clearTouchTarget();

    if(dropTarget){
        checkAnswer(card, dropTarget);
    }
}

function buildCard(animal){
    const card = document.createElement("div");
    const emoji = document.createElement("div");
    const name = document.createElement("div");

    card.className = "card";
    card.draggable = true;
    card.id = `card-${cardIdCounter++}`;
    card.dataset.category = animal.category;
    card.setAttribute("role", "button");
    card.setAttribute("tabindex", "0");
    card.setAttribute("aria-label", `${animal.name}を分類する`);

    emoji.className = "emoji";
    emoji.textContent = animal.emoji;

    name.className = "name";
    name.textContent = animal.name;

    card.append(emoji, name);

    card.addEventListener("dragstart", (event) => {
        if(!playing || !event.dataTransfer){
            event.preventDefault();
            return;
        }

        event.dataTransfer.effectAllowed = "move";
        event.dataTransfer.setData("text/plain", card.id);
    });

    card.addEventListener("touchstart", (event) => {
        if(!playing || !cards.contains(card) || touchDrag){
            return;
        }

        const point = getTouchPoint(event);
        if(!point){
            return;
        }

        const rect = card.getBoundingClientRect();
        const helper = card.cloneNode(true);

        helper.id = `${card.id}-ghost`;
        helper.style.position = "fixed";
        helper.style.left = `${rect.left}px`;
        helper.style.top = `${rect.top}px`;
        helper.style.width = `${rect.width}px`;
        helper.style.margin = "0";
        helper.style.pointerEvents = "none";
        helper.style.zIndex = "1000";
        helper.style.transform = "scale(1.04)";
        helper.style.boxShadow = "0 12px 24px rgba(0,0,0,0.25)";

        document.body.appendChild(helper);

        touchDrag = {
            card,
            helper,
            offsetX: point.x - rect.left,
            offsetY: point.y - rect.top
        };

        card.classList.add("touch-dragging");
        card.setAttribute("aria-pressed", "true");
        updateTouchDragPosition(point.x, point.y);
        event.preventDefault();
    }, { passive: false });

    card.addEventListener("touchmove", (event) => {
        if(!touchDrag || touchDrag.card !== card){
            return;
        }

        const point = getTouchPoint(event);
        if(!point){
            return;
        }

        updateTouchDragPosition(point.x, point.y);
        event.preventDefault();
    }, { passive: false });

    card.addEventListener("touchend", (event) => {
        if(!touchDrag || touchDrag.card !== card){
            return;
        }

        const point = getTouchPoint(event);
        const hoveredCategory = point ? updateTouchDragPosition(point.x, point.y) : null;
        const dropTarget = hoveredCategory instanceof HTMLElement ? hoveredCategory.dataset.category || "" : "";

        finishTouchDrag(dropTarget || null);
        event.preventDefault();
    }, { passive: false });

    card.addEventListener("touchcancel", () => {
        if(!touchDrag || touchDrag.card !== card){
            return;
        }

        finishTouchDrag(null);
    });

    card.addEventListener("keydown", (event) => {
        if(!playing || !cards.contains(card)){
            return;
        }

        const map = {
            ArrowUp: "fly",
            ArrowLeft: "sea",
            ArrowRight: "four"
        };

        const target = map[event.key];
        if(!target){
            return;
        }

        event.preventDefault();
        checkAnswer(card, target);
    });

    return card;
}

function createCards(){
    cards.replaceChildren();

    const list = [...animals];
    shuffle(list);

    const fragment = document.createDocumentFragment();
    list.forEach((animal) => {
        fragment.appendChild(buildCard(animal));
    });

    cards.appendChild(fragment);
}

function setScore(nextScore){
    score = Math.max(0, nextScore);
    scoreText.textContent = String(score);
}

function finishGame(){
    playing = false;
    startBtn.disabled = false;
    finishTouchDrag(null);

    if(timer !== null){
        window.clearInterval(timer);
        timer = null;
    }

    Array.from(document.querySelectorAll(".card")).forEach((card) => {
        card.draggable = false;
        card.setAttribute("aria-disabled", "true");
        card.setAttribute("tabindex", "-1");
    });

    result.textContent = `🎉 ゲーム終了！ スコア：${score}`;
}

function checkAnswer(card, target){
    if(!playing || !(card instanceof HTMLElement) || !cards.contains(card)){
        return;
    }

    const correct = card.dataset.category;
    if(correct !== "sea" && correct !== "fly" && correct !== "four"){
        return;
    }

    if(correct === target){
        const zone = document.querySelector(`.category[data-category="${target}"] .dropZone`);
        if(!(zone instanceof HTMLElement)){
            return;
        }

        zone.appendChild(card);
        card.draggable = false;
        card.setAttribute("aria-disabled", "true");
        card.setAttribute("tabindex", "-1");

        setScore(score + 10);
        message.textContent = "⭕ せいかい！";
        flashCategory(target, "correct");
    }else{
        setScore(score - 5);
        message.textContent = "❌ ちがう！";
        flashCategory(target, "wrong");
    }

    if(cards.querySelector(".card") === null){
        finishGame();
    }
}

categories.forEach((zone) => {
    zone.addEventListener("dragover", (event) => {
        if(playing){
            event.preventDefault();
        }
    });

    zone.addEventListener("drop", (event) => {
        event.preventDefault();

        if(!playing || !event.dataTransfer){
            return;
        }

        const id = event.dataTransfer.getData("text/plain");
        if(!id){
            return;
        }

        const card = document.getElementById(id);
        if(!(card instanceof HTMLElement)){
            return;
        }

        checkAnswer(card, zone.dataset.category || "");
    });
});

function startGame(){
    if(timer !== null){
        window.clearInterval(timer);
        timer = null;
    }

    finishTouchDrag(null);
    playing = true;
    startBtn.disabled = true;

    setScore(0);
    time = 60;
    timeText.textContent = String(time);
    message.textContent = "";
    result.textContent = "";
    resetCategoryState();

    document.querySelectorAll(".dropZone").forEach((zone) => {
        zone.replaceChildren();
    });

    createCards();

    timer = window.setInterval(() => {
        time -= 1;
        timeText.textContent = String(Math.max(0, time));

        if(time <= 0){
            finishGame();
        }
    }, 1000);
}

startBtn.addEventListener("click", startGame);
</script>

</body>
</html>
