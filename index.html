<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>動物仕分けゲーム</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:sans-serif;
    background:#eef7ff;
}

header{
    background:#42a5f5;
    color:white;
    text-align:center;
    padding:15px;
    font-size:28px;
    font-weight:bold;
}

#topBar{
    display:flex;
    justify-content:space-around;
    align-items:center;
    padding:12px;
    background:white;
    position:sticky;
    top:0;
    z-index:10;
    box-shadow:0 2px 5px rgba(0,0,0,0.15);
}

.info{
    font-size:22px;
    font-weight:bold;
}

button{
    padding:10px 22px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#ff9800;
    color:white;
}

#game{
    max-width:1300px;
    margin:auto;
    padding:15px;
}

#categories{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:15px;
    margin-bottom:25px;
}

.category{
    background:white;
    border-radius:18px;
    border:4px solid #90caf9;
    min-height:260px;
    padding:12px;
    transition:0.2s;
}

.category.correct{
    background:#e8f5e9;
    border-color:#4caf50;
}

.category.wrong{
    background:#ffebee;
    border-color:#f44336;
}

.category h2{
    text-align:center;
    margin-top:0;
}

.dropZone{
    min-height:180px;
    width:100%;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    align-items:flex-start;
    padding:10px;
}

#cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:14px;
}

.card{
    width:120px;
    background:white;
    border-radius:15px;
    padding:12px;
    text-align:center;
    cursor:grab;
    box-shadow:0 3px 8px rgba(0,0,0,0.2);
    user-select:none;
}

.card:active{
    cursor:grabbing;
}

.emoji{
    font-size:52px;
}

.name{
    margin-top:8px;
    font-size:20px;
    font-weight:bold;
}

#message{
    text-align:center;
    font-size:30px;
    margin-top:20px;
    min-height:40px;
    font-weight:bold;
}

#result{
    text-align:center;
    font-size:36px;
    margin-top:20px;
    color:#1565c0;
    font-weight:bold;
}

@media(max-width:700px){

    .card{
        width:95px;
    }

    .emoji{
        font-size:42px;
    }

    .name{
        font-size:16px;
    }

    .info{
        font-size:18px;
    }
}
</style>
</head>
<body>

<header>
動物仕分けゲーム
</header>

<div id="topBar">
    <div class="info">⏰ <span id="time">60</span>秒</div>
    <div class="info">⭐ <span id="score">0</span></div>
    <button id="startBtn">スタート</button>
</div>

<div id="game">

    <div id="categories">

        <div class="category" data-category="sea">
            <h2>🌊 海の生き物</h2>
            <div class="dropZone"></div>
        </div>

        <div class="category" data-category="fly">
            <h2>🕊 空を飛ぶ</h2>
            <div class="dropZone"></div>
        </div>

        <div class="category" data-category="four">
            <h2>🐾 四本足</h2>
            <div class="dropZone"></div>
        </div>

    </div>

    <div id="cards"></div>

    <div id="message"></div>
    <div id="result"></div>

</div>

<script>
const animals = [

    {name:"イルカ",emoji:"🐬",category:"sea"},
    {name:"サメ",emoji:"🦈",category:"sea"},
    {name:"タコ",emoji:"🐙",category:"sea"},
    {name:"クジラ",emoji:"🐋",category:"sea"},

    {name:"ワシ",emoji:"🦅",category:"fly"},
    {name:"ハト",emoji:"🕊",category:"fly"},
    {name:"フクロウ",emoji:"🦉",category:"fly"},
    {name:"アヒル",emoji:"🦆",category:"fly"},

    {name:"イヌ",emoji:"🐶",category:"four"},
    {name:"ネコ",emoji:"🐱",category:"four"},
    {name:"ライオン",emoji:"🦁",category:"four"},
    {name:"ウマ",emoji:"🐴",category:"four"}
];

const cards = document.getElementById("cards");
const scoreText = document.getElementById("score");
const timeText = document.getElementById("time");
const message = document.getElementById("message");
const result = document.getElementById("result");

let score = 0;
let time = 60;
let timer = null;
let playing = false;

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

function createCards(){

    cards.innerHTML = "";

    const list = [...animals];
    shuffle(list);

    list.forEach((animal,index)=>{

        const card = document.createElement("div");
        card.className = "card";
        card.draggable = true;
        card.id = "card"+index;
        card.dataset.category = animal.category;

        card.innerHTML = `
            <div class="emoji">${animal.emoji}</div>
            <div class="name">${animal.name}</div>
        `;

        // PC用
        card.addEventListener("dragstart",e=>{
            e.dataTransfer.setData("text/plain",card.id);
        });

        // スマホ用
        card.addEventListener("click",()=>{

            if(!playing) return;

            const choice = prompt(
`どこに分類する？

1 → 海の生き物
2 → 空を飛ぶ
3 → 四本足`
            );

            if(choice==="1"){
                checkAnswer(card,"sea");
            }

            if(choice==="2"){
                checkAnswer(card,"fly");
            }

            if(choice==="3"){
                checkAnswer(card,"four");
            }
        });

        cards.appendChild(card);
    });
}

function checkAnswer(card,target){

    const correct = card.dataset.category;

    if(correct===target){

        document
        .querySelector(`[data-category="${target}"] .dropZone`)
        .appendChild(card);

        score += 10;
        message.textContent = "⭕ せいかい！";

    }else{

        score -= 5;

        if(score<0) score=0;

        message.textContent = "❌ ちがう！";
    }

    scoreText.textContent = score;

    if(document.querySelectorAll("#cards .card").length===0){
        finishGame();
    }
}

document.querySelectorAll(".category").forEach(zone=>{

    zone.addEventListener("dragover",e=>{
        e.preventDefault();
    });

    zone.addEventListener("drop",e=>{
        e.preventDefault();

        if(!playing) return;

        const id = e.dataTransfer.getData("text/plain");
        const card = document.getElementById(id);

        const target = zone.dataset.category;

        checkAnswer(card,target);
    });
});

function startGame(){

    clearInterval(timer);

    playing = true;

    score = 0;
    time = 60;

    scoreText.textContent = score;
    timeText.textContent = time;

    result.textContent = "";
    message.textContent = "";

    document.querySelectorAll(".dropZone").forEach(z=>{
        z.innerHTML="";
    });

    createCards();

    timer = setInterval(()=>{

        time--;

        timeText.textContent = time;

        if(time<=0){
            finishGame();
        }

    },1000);
}

function finishGame(){

    playing = false;

    clearInterval(timer);

    result.innerHTML = `
    🎉 ゲーム終了！<br>
    スコア：${score}
    `;
}

document
.getElementById("startBtn")
.addEventListener("click",startGame);
</script>

</body>
</html>
